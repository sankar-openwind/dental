<div class="row">

    <!-- Manage Patient Menu Items -->
    <div ng-include src="'/app/javascripts/common/partials/managePatientMenu.html'"></div>

</div>


<br/>

<div class="row">
    <div class="col-md-2"></div>
    <div class="col-md-8">
        <div>

            <div class="panel panel-primary">
                <div class="panel-heading">
                    <h3 class="panel-title">Edit Patient Details</h3>
                </div>
                <div class="panel-body">

                    <form class="form-horizontal" role="form">

                        <div class="form-group">
                            <label for="firstName" class="col-lg-3 control-label">Patient ID</label>
                            <div class="col-lg-8">
                                <input type="text" ng-model="patient.patientid" class="form-control" disabled="true">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="firstName" class="col-lg-3 control-label">First Name
                                <!--  -->
                            </label>
                            <div class="col-lg-8">
                                <input type="text" class="form-control" ng-model="patient.firstname">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="lastName" class="col-lg-3 control-label">Last Name
                            </label>
                            <div class="col-lg-8">
                                <input type="text" class="form-control" ng-model="patient.lastname">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="lastName" class="col-lg-3 control-label">Address</label>
                            <div class="col-lg-8">
                                <input type="text" class="form-control" ng-model="patient.address">
                            </div>

                        </div>

                        <div class="form-group">
                            <label for="phone" class="col-lg-3 control-label">Phone</label>
                            <div class="col-lg-8">
                                <input type="tel" class="form-control" ng-model="patient.phone">
                            </div>
                        </div>


                        <div class="form-group">
                            <label for="Age" class="col-lg-3 control-label">Age</label>
                            <div class="col-lg-8">
                                <input type="tel" class="form-control" id="patient.age" ng-model="patient.age" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="exampleInputGender" class="col-lg-3 control-label">Gender</label>
                            <div class="col-lg-8">
                                <div class="btn-group">
                                    <label class="btn btn-info">
                                        <input type="radio" ng-model="patient.gender" value="male" id="patient.gender"> Male </label>
                                    <label class="btn btn-info">
                                        <input type="radio" ng-model="patient.gender" value="female" id="patient.gender"> Female </label>
                                </div>
                            </div>
                        </div>


                        <div class="form-group">
                            <label for="exampleInputEmail1" class="col-lg-3 control-label">Email</label>
                            <div class="col-lg-8">
                                <input type="email" class="form-control" ng-model="patient.email">
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="col-xs-6 col-sm-3 col-md-offset-3">
                                <button ng-click="updatePatient(patient)" class="btn btn-primary btn-lg">
                                    Save Patient
                                </button>
                            </div>
                        </div>

                    </form>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- Main content Ends-->
