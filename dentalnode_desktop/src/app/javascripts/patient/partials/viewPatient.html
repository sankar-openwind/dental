<div class="row">

    <!-- Manage Patient Menu Items -->
    <div ng-include src="'/app/javascripts/common/partials/managePatientMenu.html'"></div>

</div>

<div class="row">
    <div class="col-md-9"></div>
    <div class="col-md-3">
        <a ng-href="{{reportURL}}/exportPatientDetailsToPDF/{{patient.patientid}}" target="_blank">
            <button type="button" class="btn btn-success btn-md">PDF Export</button>
        </a>
    </div>
</div>
<br/>
 
<div class="row">
    <div class="col-md-2"></div>
    <div class="col-md-8">
        <div>

            <div class="panel panel-primary">
                <div class="panel-heading">
                    <h3 class="panel-title">View Patient Details   </h3>
                </div>
                <div class="panel-body">

                    <form action="patientHome.html" class="form-horizontal" role="form">

                    <div class="form-group">
                           <div class="col-lg-1 pull-right"> </div>

                           <button class="btn btn-warning pull-right btn-md " type="button" ng-click="checkIn(patient)" ng-disabled="patientCheckinBoolean"> Patient Checkin</button>
                         <div ng-if="patientCheckinBoolean" class="col-lg-4" style ='background-color: #CCFF66;'> CheckinDate :{{patientCheckin.checkinDate  | date:"MM/dd/yyyy 'at' h:mma"}}</div>

                        </div>

             <div ng-if=          <div class="form-group">
                            <label for="firstName" class="col-lg-3 control-label">Patient ID</label>
                            <div class="col-lg-8">
                                <input type="text" ng-model="patient.patientid" class="form-control" disabled="true">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="firstName" class="col-lg-3 control-label">First Name
                                <!--  -->
                            </label>
                            <div class="col-lg-8">
                                <input type="text" class="form-control" ng-model="patient.firstname" disabled="true">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="lastName" class="col-lg-3 control-label">Last Name
                            </label>
                            <div class="col-lg-8">
                                <input type="text" class="form-control" ng-model="patient.lastname" disabled="true">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="lastName" class="col-lg-3 control-label">Address</label>
                            <div class="col-lg-8">
                                <input type="text" class="form-control" disabled="true" ng-model="patient.address">
                            </div>

                        </div>

                        <div class="form-group">
                            <label for="phone" class="col-lg-3 control-label">Phone</label>
                            <div class="col-lg-8">
                                <input type="tel" class="form-control" disabled="true" ng-model="patient.phone">
                            </div>
                        </div>


                        <div class="form-group">
                            <label for="Age" class="col-lg-3 control-label">Age</label>
                            <div class="col-lg-8">
                                <input type="tel" class="form-control" id="patient.age" disabled="true" ng-model="patient.age" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="phone" class="col-lg-3 control-label">Sex</label>
                            <div class="col-lg-8">
                                <input type="tel" class="form-control" id="patient.gender" disabled="true" ng-model="patient.gender" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="exampleInputEmail1" class="col-lg-3 control-label">Email</label>
                            <div class="col-lg-8">
                                <input type="email" class="form-control" disabled="true" ng-model="patient.email">
                            </div>
                        </div>

                    </form>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- Main content Ends-->
