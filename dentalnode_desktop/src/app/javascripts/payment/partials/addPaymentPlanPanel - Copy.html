<div class="panel panel-primary" ng-show="addPaymentPlanPanel">
    <div class="panel-heading">
        <h3 class="panel-title"><span>Add Payment Plan </span></h3>
    </div>
    <div class="panel-body">
        <form novalidate class="form-horizontal" role="form">
            <!--div class="form-group">
                <label for="firstName" class="col-lg-3 control-label">Payment Details</label>
                <div class="col-lg-8">

                    <select class="form-control" ng-model="payment.paymentType">
                        <option value="Payment">Payment</option>
                        <option value="Miscellaneous Payment">Miscellaneous Payment</option>
                    </select>

                    <input type="hidden" class="form-control" ng-model="patientCheckin._id">
                </div>
            </div-->

            <div class="form-group">
                <label for="lastName" class="col-lg-3 control-label">Amount</label>
                <div class="col-lg-8">
                    <input type="text" class="form-control  " id="payment.plannedAmount" placeholder="Enter Payment Amount" ng-model="payment.plannedAmount" required>
                </div>
            </div>

            <div class="form-group">
                <label for="comment" class="col-lg-3 control-label">Comment</label>
                <div class="col-lg-8">
                    <textarea type="text" rows="3" class="form-control" ng-model="payment.comments" required></textarea>
                </div>
            </div>

            <div class="form-group">
                <div class="  col-md-3 col-md-offset-1">
                    <button ng-click="savePaymentPlan(payment,patientCheckin,'Miscellaneous Payment')" class="btn btn-primary ">
                        Save Miscellaneous Payment
                    </button>
                </div>
                 <div class="col-md-3  " ng-if="paymentMaster.paymentEstimates">
                    <button ng-click="savePaymentPlan(payment,patientCheckin,'Payment')" class="btn btn-primary ">
                        Save Treatment Payment
                    </button>
                </div>
                <div class="col-xs-6 col-sm-3 ">
                    <button ng-click="returnHome()" class="btn btn-primary ">
                        Back
                    </button>
                </div>
            </div>

        </form>
    </div>
</div>
