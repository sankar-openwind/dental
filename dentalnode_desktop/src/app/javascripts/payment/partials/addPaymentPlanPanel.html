 <div class="panel panel-primary" ng-show="addPaymentPlanPanel">
    <div class="panel-heading">
        <h3 class="panel-title"><span>Add Payment Plan </span></h3>
    </div>
    <div class="panel-body">
        <form novalidate class="form-horizontal" role="form">

            <div class="row">
                <div class="col-md-3">
                 <label for="lastName" class="control-label">Payment for Treatment</label>
             </div>
             <div class="col-md-3">
              <input type="text" class="form-control  " id="plannedPayment.treatmentAmount"   ng-model="plannedPayment.treatmentAmount"
               ng-keyup="updatePaymentPlanAmount()"  placeholder="0" required>
          </div>

          <div class="col-md-3">
              <label for="lastName" class="control-label">Misc Amount</label>
          </div>
          <div class="col-md-3">
              <input type="text" class="form-control  " id="plannedPayment.miscAmount"  ng-model="plannedPayment.miscAmount" placeholder="0"  ng-keyup="updatePaymentPlanAmount()"  required>
          </div>
      </div>

      <div class="row"><br/> </div>

      <div class="row">
          <div class="col-md-3">
              <label for="lastName" class="control-label">Total Amount</label>
          </div>
          <div class="col-md-3">
              <input type="text" class="form-control  " id="plannedPayment.totalAmount" placeholder="0" ng-model="plannedPayment.totalPlannedAmount" disabled="true" required>
          </div>
      </div>
      <div class="row"><br/> </div>
      <div class="row">
        <div class="col-md-3">
           <label for="comment" class=" control-label">Comment</label>
       </div>
       <div class="col-md-6"><textarea type="text" rows="3" class="form-control" ng-model="plannedPayment.comments" required></textarea>
       </div>

   </div>


    <div class="row"><br/> </div>
     <div class="row">
      <div class="col-md-3">

      </div>
      <div class="col-md-3">
        <button ng-click="savePaymentPlan(plannedPayment,patientCheckin)" class="btn btn-primary ">
            Save  Planned Payment
        </button>
    </div>
    <div class="col-md-3">
       <button ng-click="returnHome()" class="btn btn-primary ">
        Back
    </button>
</div>


</div>

</form>
</div>
</div>
