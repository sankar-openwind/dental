<div>

    <div class="row">

        <!-- Manage Patient Menu Items -->

        <div ng-include src="'/app/javascripts/common/partials/managePatientMenu.html'"></div>

    </div>


    <div class="row">
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title">Photos</h3>
            </div>
            <div class="panel-body">
                <div ng-controller="ModalDemoCtrl">
                    <script type="text/ng-template" id="myModalContent.html">
                        <div class="modal-header">
                            <h3 class="modal-title">Slide Show</h3>
                        </div>
                        <div class="modal-body">
                            <div ng-controller="CarouselDemoCtrl">
                                <div style="height: 305px">
                                    <carousel interval="myInterval">
                                        <slide ng-repeat="slide in slides" active="slide.active">
                                            <img ng-src="{{slide.image}}" style="margin:auto;">
                                            <div class="carousel-caption">
                                                <h4>Slide {{$index}}</h4>
                                                <p>{{slide.text}}</p>
                                            </div>
                                        </slide>
                                    </carousel>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-primary" ng-click="ok()">OK</button>
                        </div>
                    </script>
                    <input type="text" ng-model="patient.path" class="form-control" placeholder="Input Path">
                    <button class="btn btn-default" ng-click="open('lg')">Show Photos</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Content Ends -->
</div>
