<div class="row">

</div>

<div class="row">
	<br>
</div>

<div class="row">
	<div class="col-md-1"></div>
	<div class="col-md-7">
		<p class="text-left">
			<strong> Patient Name: </strong> {{patient.patientDetails.firstname}} {{patient.patientDetails.lastname}}
		</p>
	</div>
	<div class="col-md-2">
		<p class="text-right">
			<strong> Patient ID: </strong> {{patient.patientDetails.patientid}}
		</p>
	</div>
	<div class="col-md-2"></div>
</div>

<div class="row">

	<div class="col-md-12">
		<div class="panel panel-primary">
			<div class="panel-heading">
				<h3 class="panel-title">Diagnosis Summary</h3>
			</div>
			<div class="panel-body">
				<div ng-include src="'teethDisplaySubPage.html'"></div>
			</div>
		</div>
	</div>

</div>

<div class="row">

	<div class="col-md-12">
		<div class="panel panel-primary">
			<div class="panel-heading">
				<h3 class="panel-title"> {{ patient.patientDiagnosis.dateOfDiagnosis }}</h3>
			</div>
			<div class="panel-body">
				<div class="col-md-9">
					<div ng-repeat="(disease, diseaseValue) in patient.patientDiagnosis.fullDiagnosisData">

						<b> {{disease}}</b>
						<div ng-repeat="(subDisease, subDiseaseValue) in diseaseValue">
							{{subDisease}}    --> <span ng-repeat="teeth in subDiseaseValue">{{teeth}} , </span>
						</div>
						<br/>

					</div>
				</div>
				<div class="col-md-3">
					<div ng-repeat="key in colorsOrder">
						<button type="button" class="btn active" ng-style="setTeethColor('{{colors[key]}}')">
							{{key}}
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>

</div>
