<div ng-controller="patientController">

			<div class="row">
				<div class="panel panel-primary">
					<div class="panel-heading">
						<h3 class="panel-title">Actions</h3>
					</div>
					<div class="panel-body">
						<div class="col-md-12">
							<div class="col-md-1"></div>
							<!-- Manage Patient Menu Items -->
						
				<div ng-include src="'managePatientMenu.html'"></div>
						</div>
					</div>
				</div>
			</div>

			<div class="row">
				<s:form role="form" class="form-inline" action="uploadFile" method="POST" enctype="multipart/form-data">
					
					<s:hidden name="patient.id" label="patient id" />
					<s:hidden name="patient.firstname" label="First name" />
					<s:hidden name="patient.lastname" label="Last Name" />
					<s:hidden name="patient.address" label="Address" />
					<s:hidden name="patient.phone" label="Phone" />
					<s:hidden name="patient.email" label="Email" />
					<s:hidden name="patient.dateOfBirth" label="Data of Birth" />
					<s:hidden name="patient.gender" label="Gender" />
					<s:hidden name="patient.maritalStatus" label="Martial Status" />
					
					<div class="form-group">
						<%-- <s:file name="files" multiple="multiple" class=" btn btn-info" label="Select a Image Files to upload" size="40" /> --%>
						<input type="file" id="input-files" class=" btn btn-info"
							multiple="multiple" name="files">
					</div>
					
					<div class="form-group">
						<button type="submit" class="btn btn-primary">Upload</button>
					</div>
				</s:form>
			</div>

			<div class="row">
				<div class="panel panel-primary">
					<div class="panel-heading">
						<h3 class="panel-title">Photos</h3>
					</div>
					<div class="panel-body">	
    				
					<s:iterator value="filesFileName">
						<div class="col-sm-3 col-md-3">
	    					<a class="thumbnail">
	    						<img src="<s:url action='ImageAction'>
	    								<s:param name='filePath'><s:property value='destPath'></s:property></s:param>
	    								<s:param name='imageId'><s:property></s:property></s:param>
	    								</s:url>"  class="obj"/>
	    					</a>
	    				</div>
					</s:iterator>
					
					</div>
					
				</div>
			</div>
			
			
			
			<div id="preview" class="row"></div>


			<div class="col-md-1"></div>
			<!-- Main content Ends-->


			<!-- Content Ends -->
		</div>
	</div>

	<!-- Modal -->
	<div class="modal fade" id="myModal" tabindex="-1" role="dialog"
		aria-labelledby="myModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal"
						aria-hidden="true">&times;</button>
					<h4 class="modal-title">Image Editing</h4>
				</div>
				<div class="modal-body">
					<div id="mainHolder"></div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
					<button type="button" id="crop" class="btn btn-primary">Crop</button>
					<button type="button" id="saveImage" class="btn btn-primary">Save
						changes</button>
				</div>
			</div>
			<!-- /.modal-content -->
		</div>
		<!-- /.modal-dialog -->
	</div>
</div>
