<div class="row"  ng-controller="reportsController">
	<div class="col-md-12">
		<div>

			<div class="panel panel-primary">
				<div class="panel-heading">
					<h3 class="panel-title">Net Pending Amount Report </h3>
				</div>
				<div class="panel-body">
				<table class="table table-hover">
      <thead>
        <tr>
          <th>PatientID</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Pending Amount</th>
        </tr>
      </thead>
      <tbody>
        <tr ng-repeat="pendingPayment in pendingAmountReport.pendingAmountReport">
          <th>{{pendingPayment.patientId}}</th>
          <td>{{pendingPayment.firstname}}</td>
          <td>{{pendingPayment.lastname}}</td>
          <td>{{pendingPayment.netPendingAmount}}</td>
        </tr>
        
      </tbody>
    </table>
			 
				</div>
			</div>
		</div>

	</div>
</div>
