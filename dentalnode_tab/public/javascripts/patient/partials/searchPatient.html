<!-- Patient Search Form -->
<div class="panel panel-primary">
	<div class="panel-heading">
		<h3 class="panel-title">Patient Search</h3>
	</div>
	<div class="panel-body">

		<form  novalidate  class="form-horizontal" class="form-horizontal" role="form">

			<div class="form-group">
				<label for="firstName" class="col-lg-3 control-label">Patient
					ID</label>
				<div class="col-lg-8">
					<input type="text" ng-model="patient.patientid" class="form-control"
					id="firstName" placeholder="Enter Patient ID">
				</div>
			</div>

			<div class="form-group">
				<label for="firstName" class="col-lg-3 control-label">First
					Name</label>
				<div class="col-lg-8">
					<input type="text" class="form-control" ng-model="patient.firstname"
					id="firstName" placeholder="Enter Frist Name">
				</div>
			</div>
			<div class="form-group">
				<label for="lastName" class="col-lg-3 control-label">Phone
					Number</label>
				<div class="col-lg-8">
					<input type="text" class="form-control " id="lasttName"
					placeholder="Enter Patient Phone" ng-model="patient.phone">
				</div>
			</div>

			<div class="form-group">
				<div class="col-xs-6 col-sm-3 col-md-offset-3">
					<button ng-click="searchPatient(patient)"
					class="btn btn-primary btn-lg pull-fluid">
						Search
						Patient
					</button>
				</div>
			</div>
		</form>

		<!-- START OF PATIENT SEARCH RESULT VIEW -->
		<div class="panel panel-primary" ng-show="searchPatients">
			<div class="panel-heading">
				<h3 class="panel-title">Patient Search Results</h3>
			</div>
			<div class="panel-body">

				<table class="table table-bordered table-hover">
					<tr>
						<th>Patient ID</th>
						<th>Name</th>
						<th>Phone</th>
						<th>View Patient</th>
					</tr>

					<tr ng-repeat="item in searchPatients">
						<td><a href="/profile?#/viewPatient/{{item.patientid}}">{{item.patientid}}</a></td>
						<td> {{item.firstname}} </td>
						<td> {{item.phone}} </td>
						<td><a class="btn btn-primary" type="button" href="/profile?#/viewPatient/{{item.patientid}}"> View Patient</a> </td>
					</tr>


				</table>

			</div>
		</div>
		<!-- END OF PATIENT SEARCH RESULT VIEW -->
